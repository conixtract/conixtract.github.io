<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paul Kern — Personal Site</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="v3-spectrum.css" />

  <style>
    html, body, #root { height: 100%; margin: 0; }
    /* prevent overscroll bounce showing a white/dark bar above/below the page */
    html, body {
      overscroll-behavior-y: none;
      background: oklch(0.16 0.02 285); /* dark default — overridden below if light */
    }
    html[data-theme='light'], html[data-theme='light'] body {
      background: oklch(0.985 0.005 90);
    }
    body { font-family: 'Inter Tight', system-ui, -apple-system, sans-serif; }
  </style>

  <script>
    /* read theme from localStorage as early as possible so the page bg matches
       the theme the user picked last time — avoids a flash of the wrong color
       and keeps overscroll bouncing against the right background. */
    try {
      var t = localStorage.getItem('pk-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { /* keep default dark */ }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="v3-spectrum.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
